<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Sheet</title>
    <link rel="stylesheet" href="side-sheet.css">
</head>
<body>
    <button id="openSheetBtn">Open Side Sheet</button>

    <div class="side-sheet" id="sideSheet">
        <div class="side-sheet-content">
            <button class="close-btn" id="closeSheetBtn">&times;</button>
            <h2>Side Sheet</h2>
            <p>This is a side sheet that slides in from the side. You can add any content here like forms, details, etc.</p>
            <p>Click the close button or outside the sheet to close it.</p>
        </div>
    </div>

    <script src="side-sheet.js"></script>
</body>
</html>
