<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion</title>
    <link rel="stylesheet" href="accordion.css">
</head>
<body>
    <div class="accordion">
        <div class="accordion-item">
            <button class="accordion-header">Section 1</button>
            <div class="accordion-content">
                <p>Content for Section 1. This is an expandable/collapsible panel.</p>
            </div>
        </div>
        <div class="accordion-item">
            <button class="accordion-header">Section 2</button>
            <div class="accordion-content">
                <p>Content for Section 2. Click the header to toggle visibility.</p>
            </div>
        </div>
        <div class="accordion-item">
            <button class="accordion-header">Section 3</button>
            <div class="accordion-content">
                <p>Content for Section 3. You can add any content here like text, images, etc.</p>
            </div>
        </div>
    </div>

    <script src="accordion.js"></script>
</body>
</html>
