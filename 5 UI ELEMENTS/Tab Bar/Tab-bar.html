<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Bar</title>
    <link rel="stylesheet" href="tab-bar.css">
</head>
<body>
    <div class="tab-container">
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="tab1">Tab 1</button>
            <button class="tab-btn" data-tab="tab2">Tab 2</button>
            <button class="tab-btn" data-tab="tab3">Tab 3</button>
        </div>
        <div class="tab-content">
            <div class="tab-pane active" id="tab1">
                <p>Content for Tab 1. This is the first tab's content area.</p>
            </div>
            <div class="tab-pane" id="tab2">
                <p>Content for Tab 2. Click other tabs to switch between content.</p>
            </div>
            <div class="tab-pane" id="tab3">
                <p>Content for Tab 3. You can add different content in each tab.</p>
            </div>
        </div>
    </div>

    <script src="tab-bar.js"></script>
</body>
</html>
